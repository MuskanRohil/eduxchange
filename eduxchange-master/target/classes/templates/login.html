<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .form-container {
            width: 320px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            text-align: center;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="errorMsg" class="error"></p>
    <p>Don't have account? <a href="register.html">Register</a></p>
</div>

<script>
function login() {

    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;

    var users = JSON.parse(localStorage.getItem("users")) || [];

    var validUser = users.find(user => user.email === email && user.password === password);

    if (validUser) {
        localStorage.setItem("loggedInUser", JSON.stringify(validUser));
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("errorMsg").innerText = "Invalid email or password!";
    }
}
</script>

</body>
</html>
